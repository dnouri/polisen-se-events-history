name: Daily Parquet Release

on:
  schedule:
    # Run at 04:15 UTC daily (05:15 CET / 06:15 CEST)
    # Using :15 to avoid peak load at the top of the hour
    - cron: '15 4 * * *'
  workflow_dispatch:
    # Allow manual trigger for testing

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history needed for git archaeology (extracting events from all commits)
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run tests
        run: uv run --with pytest --with lxml --with cssselect --with duckdb --with tqdm pytest

      - name: Generate events.parquet
        run: uv run export-events.py --include-html --output events.parquet

      - name: Validate v2 release contract
        run: uv run scripts/validate_export_schema.py events.parquet

      - name: Generate geography quality metrics
        id: geography_quality
        run: |
          GITHUB_OUTPUT_ARG=()
          if [ -n "${GITHUB_OUTPUT:-}" ]; then
            GITHUB_OUTPUT_ARG=(--github-output "$GITHUB_OUTPUT")
          fi

          uv run scripts/geography_quality_metrics.py events.parquet \
            --json geography-quality.json \
            --markdown geography-quality.md \
            "${GITHUB_OUTPUT_ARG[@]}"

          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            cat geography-quality.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: data-latest
          name: Latest Events Data
          body: |
            ## Swedish Police Events Dataset

            **Updated:** ${{ github.event.repository.updated_at || 'Daily at 04:15 UTC' }}
            **Events:** ${{ steps.geography_quality.outputs.total_rows }} unique events
            **Date range:** ${{ steps.geography_quality.outputs.min_date }} to ${{ steps.geography_quality.outputs.max_date }}

            ### Schema

            `events.parquet` uses the breaking v2 geography schema. Legacy columns `location_name`, `latitude`, and `longitude` have been removed; use `api_location_name`, `api_location_latitude`, and `api_location_longitude` instead.

            ### Geography Quality

            Metrics are generated from the released `events.parquet` after schema validation. Non-zero unresolved/conflict source-data counts are reported here and in the attached metrics assets; they do not fail a release. The metrics check does fail empty artifacts, invalid datetimes, arithmetic inconsistencies, or schema/reference/resolver-contract impossibilities.

            - Derived municipality assigned: ${{ steps.geography_quality.outputs.derived_municipality_assigned }} (${{ steps.geography_quality.outputs.derived_municipality_assigned_pct }})
            - County-only rows: ${{ steps.geography_quality.outputs.county_only_rows }} (${{ steps.geography_quality.outputs.county_only_pct }})
            - No derived geography rows: ${{ steps.geography_quality.outputs.fully_unresolved_rows }} (${{ steps.geography_quality.outputs.fully_unresolved_pct }})
            - Same-county municipality mismatches: ${{ steps.geography_quality.outputs.same_county_municipality_mismatch }} (${{ steps.geography_quality.outputs.same_county_municipality_mismatch_pct }})
            - Cross-county conflicts: ${{ steps.geography_quality.outputs.cross_county_conflict }} (${{ steps.geography_quality.outputs.cross_county_conflict_pct }})

            Full reports: `geography-quality.json` and `geography-quality.md`.

            ### Download

            ```bash
            curl -LO https://github.com/${{ github.repository }}/releases/download/data-latest/events.parquet
            curl -LO https://github.com/${{ github.repository }}/releases/download/data-latest/geography-quality.json
            curl -LO https://github.com/${{ github.repository }}/releases/download/data-latest/geography-quality.md
            ```

            ### Quick Analysis with DuckDB

            ```sql
            -- Query directly from URL (no download needed)
            SELECT type, COUNT(*) as count
            FROM 'https://github.com/${{ github.repository }}/releases/download/data-latest/events.parquet'
            GROUP BY type
            ORDER BY count DESC
            LIMIT 10;
            ```
          files: |
            events.parquet
            geography-quality.json
            geography-quality.md
          make_latest: true
